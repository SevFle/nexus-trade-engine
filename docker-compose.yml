services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus"]
      interval: 5s
      timeout: 3s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env.example
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      NEXUS_DATABASE_URL: postgresql+asyncpg://nexus:nexus@db:5432/nexus
      NEXUS_VALKEY_URL: valkey://valkey:6379/0

  worker:
    build: .
    entrypoint: ["python", "-m", "taskiq", "worker", "engine.tasks.worker:broker"]
    env_file: .env.example
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      NEXUS_DATABASE_URL: postgresql+asyncpg://nexus:nexus@db:5432/nexus
      NEXUS_VALKEY_URL: valkey://valkey:6379/0

volumes:
  pgdata:
