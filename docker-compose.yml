# Nexus Trade Engine — core Docker Compose stack.
#
# Three core services wired together over a dedicated bridge network with
# health-gated startup ordering:
#
#   nexus-postgres  PostgreSQL 16 + TimescaleDB, bootstrap SQL auto-run on first boot
#   nexus-valkey    Redis-compatible cache / TaskIQ broker / rate-limit backend
#   nexus-app       Nexus FastAPI app built from ./Dockerfile (distroless uvicorn)
#   worker          TaskIQ async worker (engine.tasks.worker:broker)
#
# Networking:
#   - All services attach to the user-defined bridge network ``nexus-net``
#     so they resolve each other by service name (e.g.
#     ``nexus-postgres:5432``, ``nexus-valkey:6379``).
#   - Host ports bind to 127.0.0.1 only; put a reverse proxy in front for
#     real traffic (see docs/deployment.md).
#
# Health checks:
#   - Every service defines a healthcheck.
#   - nexus-app uses ``depends_on.<svc>.condition: service_healthy`` so it
#     does not boot until nexus-postgres + nexus-valkey are accepting
#     connections. The worker reuses the same gates.
#
# Volumes:
#   - ``pgdata``      persists the Postgres data dir across recreation.
#   - ``valkeydata``  persists Valkey's AOF/RDB snapshots at /data.
#
# Env wiring (engine/config.py — field ``foo_bar`` ↔ env ``NEXUS_FOO_BAR``):
#   - NEXUS_DATABASE_URL → postgresql+asyncpg://<user>:<pw>@nexus-postgres:5432/<db>
#   - NEXUS_VALKEY_URL   → valkey://nexus-valkey:6379/0
#
# Usage:
#   cp .env.example .env          # then set POSTGRES_PASSWORD + NEXUS_SECRET_KEY
#   docker compose up -d
#   docker compose config         # validate the rendered config
#
# NOTE: the SQLAlchemy schema is applied via Alembic (``make migrate``), not
# by this file. scripts/init_db.sql only enables the TimescaleDB extension
# and seeds the time-series hypertables; run migrations once after the first
# ``docker compose up``.

services:
  nexus-postgres:
    image: timescale/timescaledb:2.17.2-pg16
    restart: unless-stopped
    environment:
      # PGDATA is set explicitly so the named volume mount and the data
      # directory always agree on the non-HA Timescale image.
      PGDATA: /home/postgres/pgdata/data
      POSTGRES_USER: ${POSTGRES_USER:?must be set in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:?must be set in .env}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/home/postgres/pgdata/data
      # TimescaleDB extension + seed hypertables, run once on first init
      # by the postgres entrypoint (only fires against an empty data dir).
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/10-init-db.sql:ro
    networks:
      - nexus-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  nexus-valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    command: ["valkey-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      # Persist AOF/RDB snapshots across container recreation. The official
      # valkey image writes its dump/appendonly files to /data.
      - valkeydata:/data
    networks:
      - nexus-net
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  nexus-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: nexus-app:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    environment:
      # Connection strings override whatever .env ships so the app talks
      # to the sibling compose services by DNS name.
      NEXUS_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@nexus-postgres:5432/${POSTGRES_DB}
      NEXUS_VALKEY_URL: valkey://nexus-valkey:6379/0
    depends_on:
      nexus-postgres:
        condition: service_healthy
      nexus-valkey:
        condition: service_healthy
    networks:
      - nexus-net
    # The runtime image is distroless (no shell, no curl), so the
    # healthcheck uses the in-venv Python + urllib to hit the liveness
    # route. /health is a cheap process check; /ready (db + valkey) is
    # reserved for the load-balancer pool.
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).close()"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # TaskIQ async worker — consumes the broker backed by nexus-valkey and
  # runs background jobs (backtests, async DSR/deletion tasks, etc.). Shares
  # the same image, env wiring, network and startup ordering as
  # ``nexus-app``; it only differs in the entrypoint (worker loop instead of
  # uvicorn) and exposes no host port.
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: nexus-app:latest
    restart: unless-stopped
    entrypoint: ["python", "-m", "taskiq", "worker", "engine.tasks.worker:broker"]
    env_file: .env
    environment:
      # Same connection strings as nexus-app so the worker resolves the
      # sibling compose services by DNS name.
      NEXUS_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@nexus-postgres:5432/${POSTGRES_DB}
      NEXUS_VALKEY_URL: valkey://nexus-valkey:6379/0
    depends_on:
      nexus-postgres:
        condition: service_healthy
      nexus-valkey:
        condition: service_healthy
    networks:
      - nexus-net

networks:
  nexus-net:
    driver: bridge

volumes:
  pgdata:
  valkeydata:
