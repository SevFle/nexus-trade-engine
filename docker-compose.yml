services:
  db:
    # Pinned to TimescaleDB 2.17.2 on PostgreSQL 16 (content-addressed by
    # registry digest) so deploys are reproducible and immune to upstream
    # tag re-pointing. Bump deliberately via PR when upgrading.
    image: timescale/timescaledb:2.17.2-pg16@sha256:4e459e217f00cbb09920c34d245501e63427e6767a495de57ce76823ff280f12
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?must be set in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:?must be set in .env}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

  valkey:
    # Pinned to Valkey 8.0.2 (alpine) by registry digest for reproducible
    # deploys. Data is persisted to the named `valkeydata` volume below so
    # it survives container recreation.
    image: valkey/valkey:8.0.2-alpine@sha256:752ba000a58bc8925d11ee863a39b5225617cd2cb3dbc9ec8ac65268b65ebb6d
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - valkeydata:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      NEXUS_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      NEXUS_VALKEY_URL: valkey://valkey:6379/0

  worker:
    # taskiq worker consuming the broker defined at
    # ``engine.tasks.worker:broker``. Its dependency gates mirror the API
    # service (``app`` / nexus-api) so it never starts before the database
    # and Valkey are both reporting healthy.
    build: .
    entrypoint: ["python", "-m", "taskiq", "worker", "engine.tasks.worker:broker"]
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      NEXUS_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      NEXUS_VALKEY_URL: valkey://valkey:6379/0

volumes:
  pgdata:
  valkeydata:
