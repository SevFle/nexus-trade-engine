# MkDocs Material configuration for the Nexus Trade Engine docs.
#
# Why MkDocs + Material (not VitePress/Nextra/plain Markdown):
#   This is a Python-only repo (FastAPI + SQLAlchemy + TaskIQ + asyncpg).
#   Pulling in a Node-based doc toolchain would cross-contaminate the build
#   pipeline for a single language. Material consumes the existing Markdown
#   verbatim, renders Mermaid out of the box, and gives full-text search +
#   versioned navigation. The files stay first-class on GitHub too. See the
#   rationale comment at the top of docs/README.md for the full trade-off.
#
# Install / preview:
#   uv sync --extra docs && uv run mkdocs serve   # http://127.0.0.1:8000
#   uv run mkdocs build                           # static site into ./site/
#
# NOTE on `--strict`: do NOT run `mkdocs build --strict` in CI yet. The
# docs intentionally link to source files with repo-root-relative paths
# (e.g. `../engine/app.py`), which resolve on GitHub but point *outside*
# docs_dir for MkDocs. `validation.links.not_found = warn` keeps those as
# warnings so the build stays green. Flipping to `--strict` requires first
# routing source links through a generated API section. See docs/README.md.

site_name: Nexus Trade Engine
site_description: AI-native plugin trading framework — engineering documentation.
site_url: https://github.com/SevFle/nexus-trade-engine
repo_url: https://github.com/SevFle/nexus-trade-engine
repo_name: SevFle/nexus-trade-engine
docs_dir: docs
site_dir: site

# README.md doubles as the site index. MkDocs builds it to / when it is the
# only top-level "read me" and is listed first in nav below.
use_directory_urls: true

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

# Keep source-relative links (../engine/...) as warnings, not errors.
validation:
  nav:
    omitted_files: warn
    not_found: warn
  links:
    not_found: warn
    absolute_links: warn
    unrecognized_links: warn
    anchors: warn

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search:
      lang: [en]

nav:
  - Overview: README.md
  - Architecture:
      - System overview: architecture/overview.md
      - Core domains: architecture/core-domains.md
      - Database: architecture/database.md
      - Plugin system: architecture/plugins.md
  - API & protocols:
      - REST / WebSocket API: api-reference.md
      - MCP server: mcp-server.md
  - Data model: data-model.md
  - Guides:
      - Development setup: development.md
      - Deployment: deployment.md
      - Releasing: RELEASING.md
      - Plugin developer guide: PLUGIN_DEV_GUIDE.md
      - Contributors: contributors.md
  - Decisions:
      - ADR index: adr/README.md
      - 0001 — Scaffold & tech choices: adr/0001-scaffold-tech-choices.md
      - 0002 — Auth & RBAC: adr/0002-auth-rbac.md
      - 0003 — Mobile / PWA strategy: adr/0003-mobile-app-strategy.md
      - 0004 — TaskIQ task queue: adr/0004-task-queue-taskiq.md
      - 0005 — Valkey over Redis: adr/0005-valkey-over-redis.md
      - 0006 — bcrypt + Fernet: adr/0006-bcrypt-fernet.md
      - 0007 — Strategy sandbox import allowlist: adr/0007-strategy-sandbox-allowlist-imports.md
      - 0008 — Pluggable metrics backend: adr/0008-pluggable-metrics-backend.md
      - 0009 — Cross-replica EventBus bridge: adr/0009-cross-replica-eventbus-bridge.md
      - ADR template: adr/template.md
  - Operations:
      - SLOs: operations/slos.md
      - Backup & recovery: operations/backup-and-recovery.md
      - DR drill checklist: operations/dr-drill-checklist.md
      - Load testing: operations/load-testing.md
      - Runbooks:
          - Index: operations/runbooks/README.md
          - API availability: operations/runbooks/api-availability.md
          - API latency: operations/runbooks/api-latency.md
          - Auth / MFA: operations/runbooks/auth-mfa.md
          - Backtest submit: operations/runbooks/backtest-submit.md
          - Common issues: operations/runbooks/common-issues.md
          - Task pipeline: operations/runbooks/task-pipeline.md
          - Webhook delivery: operations/runbooks/webhook-delivery.md
  - Observability:
      - Logging: observability/logging.md
  - Compliance:
      - Data processors (GDPR): legal/processors.md
  - Known limitations: known-limitations.md
  - Last audit: LAST_AUDIT.md
