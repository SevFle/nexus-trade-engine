site_name: Nexus Trade Engine
site_description: Engineering documentation for Nexus Trade Engine — a Python plugin-driven algorithmic trading platform.
site_url: https://example.com/docs
repo_url: https://github.com/your-org/nexus-trade-engine
docs_dir: docs
site_dir: site
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mermaid2

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Overview: README.md
  - Development setup: development.md
  - Plugin developer guide: PLUGIN_DEV_GUIDE.md
  - Releasing: RELEASING.md
  - Architecture:
      - Overview: architecture/overview.md
      - Database & data model: architecture/database.md
      - Plugin runtime & sandbox: architecture/plugins.md
  - API reference:
      - Conventions & auth: api-reference/index.md
      - Authentication & MFA: api-reference/auth.md
      - Portfolios: api-reference/portfolios.md
      - Backtest: api-reference/backtest.md
      - Market data: api-reference/market-data.md
      - Strategies: api-reference/strategies.md
      - Marketplace: api-reference/marketplace.md
      - Tax reports: api-reference/tax.md
      - Strategy scoring: api-reference/scoring.md
      - Webhooks: api-reference/webhooks.md
      - WebSocket stream: api-reference/websocket.md
      - Privacy (GDPR / CCPA): api-reference/privacy.md
      - Legal documents: api-reference/legal.md
      - Reference data (instrument search): api-reference/reference.md
      - System & health: api-reference/system.md
  - Decisions:
      - ADR index: adr/README.md
      - 0001 — Scaffold tech choices: adr/0001-scaffold-tech-choices.md
      - 0002 — Auth & RBAC: adr/0002-auth-rbac.md
      - 0003 — Mobile / PWA: adr/0003-mobile-app-strategy.md
      - 0004 — Multi-provider auth: adr/0004-multi-provider-auth.md
      - 0005 — Plugin sandbox: adr/0005-plugin-sandbox.md
      - 0006 — TaskIQ + Valkey: adr/0006-taskiq-valkey.md
  - Operations:
      - Deployment: operations/deployment.md
      - SLOs: operations/slos.md
      - Backup & DR: operations/backup-and-recovery.md
      - DR drill checklist: operations/dr-drill-checklist.md
      - Load testing: operations/load-testing.md
      - Known limitations & tech debt: operations/known-limitations.md
      - Runbooks:
          - Index: operations/runbooks/README.md
          - API availability: operations/runbooks/api-availability.md
          - API latency: operations/runbooks/api-latency.md
          - Auth & MFA: operations/runbooks/auth-mfa.md
          - Backtest submit: operations/runbooks/backtest-submit.md
          - Task pipeline: operations/runbooks/task-pipeline.md
          - Webhook delivery: operations/runbooks/webhook-delivery.md
          - Database: operations/runbooks/database.md
  - Observability:
      - Logging: observability/logging.md
  - Legal:
      - Sub-processor inventory: legal/processors.md
  - Contributors: contributors.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/your-org/nexus-trade-engine
