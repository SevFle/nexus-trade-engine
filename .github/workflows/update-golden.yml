name: Update Golden Baselines

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are baselines being updated? (required for audit trail)"
        required: true
        type: string
      fixtures:
        description: "Comma-separated fixture names (empty = all)"
        required: false
        type: string
        default: ""

env:
  REQUIRE_APPROVAL: "1"

jobs:
  update-golden:
    name: Regenerate Golden Baselines
    runs-on: [self-hosted, nexus]
    timeout-minutes: 15

    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: nexus_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      valkey:
        image: valkey/valkey:8-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e .[dev]

      - name: Run migrations
        run: alembic upgrade head
        env:
          NEXUS_DATABASE_URL: postgresql+asyncpg://nexus:test_password@localhost:5432/nexus_test

      - name: Regenerate golden baselines
        env:
          NEXUS_DATABASE_URL: postgresql+asyncpg://nexus:test_password@localhost:5432/nexus_test
          NEXUS_VALKEY_URL: redis://localhost:6379/0
          NEXUS_APP_ENV: test
          UPDATE_REASON: ${{ github.event.inputs.reason }}
        run: |
          echo "Updating golden baselines. Reason: $UPDATE_REASON"
          python -m pytest tests/test_golden_backtests.py --update-golden -v --tb=short

      - name: Verify determinism (re-run without update)
        env:
          NEXUS_DATABASE_URL: postgresql+asyncpg://nexus:test_password@localhost:5432/nexus_test
          NEXUS_VALKEY_URL: redis://localhost:6379/0
          NEXUS_APP_ENV: test
        run: |
          python -m pytest tests/test_golden_backtests.py -v --tb=short

      - name: Create PR with updated baselines
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPDATE_REASON: ${{ github.event.inputs.reason }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b update-golden/$(date +%Y%m%d-%H%M%S)
          git add tests/golden/backtests/ tests/data/snapshots/
          git commit -m "chore: update golden baselines — $UPDATE_REASON"
          git push origin HEAD
          gh pr create \
            --title "chore: update golden baselines" \
            --body "## Reason
          $UPDATE_REASON

          ## Workflow
          Triggered via update-golden workflow by @$(git log -1 --format='%an').

          ## Checklist
          - [ ] Diff reviewed — no unintended metric changes
          - [ ] Reason documented above
          - [ ] All golden tests pass on re-run" \
            --reviewer "${{ github.actor }}"
