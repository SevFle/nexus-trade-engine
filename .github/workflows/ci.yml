name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-engine:
    name: Engine Tests
    runs-on: [self-hosted, nexus]

    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: nexus_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      valkey:
        image: valkey/valkey:8-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e .[dev]

      - name: Run migrations
        run: alembic upgrade head
        env:
          NEXUS_DATABASE_URL: postgresql+asyncpg://nexus:test_password@localhost:5432/nexus_test

      - name: Run tests
        env:
          NEXUS_DATABASE_URL: postgresql+asyncpg://nexus:test_password@localhost:5432/nexus_test
          NEXUS_VALKEY_URL: redis://localhost:6379/0
          NEXUS_APP_ENV: test
        run: python -m pytest tests -v --tb=short --junitxml=test-results.xml

      - name: Run golden backtest tests
        if: |
          github.event_name == 'push' && github.ref == 'refs/heads/main'
          || contains(github.event.pull_request.changed_files.*.filename, 'engine/core/backtest_runner.py')
          || contains(github.event.pull_request.changed_files.*.filename, 'engine/core/cost_model.py')
          || contains(github.event.pull_request.changed_files.*.filename, 'engine/core/metrics.py')
          || contains(github.event.pull_request.changed_files.*.filename, 'engine/core/portfolio.py')
          || contains(github.event.pull_request.changed_files.*.filename, 'engine/core/order_manager.py')
          || contains(github.event.pull_request.changed_files.*.filename, 'tests/golden/backtests/')
          || contains(github.event.pull_request.changed_files.*.filename, 'tests/test_golden_backtests.py')
        env:
          NEXUS_DATABASE_URL: postgresql+asyncpg://nexus:test_password@localhost:5432/nexus_test
          NEXUS_VALKEY_URL: redis://localhost:6379/0
          NEXUS_APP_ENV: test
        run: python -m pytest tests/test_golden_backtests.py -v --tb=short

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

  test-frontend:
    name: Frontend Lint
    runs-on: [self-hosted, nexus]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install & lint
        run: |
          cd frontend
          npm ci
          npm run build

  docker:
    name: Docker Build
    runs-on: [self-hosted, nexus]
    needs: [test-engine]

    steps:
      - uses: actions/checkout@v4

      - name: Build engine image
        run: docker build -t nexus-engine:test .

      - name: Build frontend image
        run: docker build -t nexus-frontend:test ./frontend
