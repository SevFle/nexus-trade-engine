name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-engine:
    name: Engine Tests
    runs-on: [self-hosted, nexus]
    container:
      image: python:3.12

    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: nexus_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      valkey:
        image: valkey/valkey:8-alpine
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -e .[dev]

      - name: Run migrations
        run: alembic upgrade head
        env:
          NEXUS_DATABASE_URL: postgresql+asyncpg://nexus:test_password@postgres:5432/nexus_test

      - name: Run tests
        env:
          NEXUS_DATABASE_URL: postgresql+asyncpg://nexus:test_password@postgres:5432/nexus_test
          NEXUS_VALKEY_URL: redis://valkey:6379/0
          NEXUS_APP_ENV: test
        run: python -m pytest tests -v --tb=short --junitxml=test-results.xml --cov=engine --cov-report=term-missing --cov-report=html --cov-report=xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            htmlcov/
            coverage.xml

  test-frontend:
    name: Frontend Lint
    runs-on: [self-hosted, nexus]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install & lint
        run: |
          cd frontend
          # Workaround npm bug #4828: lockfile-pinned optional platform deps
          # (e.g. @rollup/rollup-linux-x64-gnu) get skipped when the lockfile
          # was generated on a different platform. Drop the lock so npm
          # resolves rollup's platform binary fresh on Linux.
          rm -f package-lock.json
          npm install --no-audit --no-fund
          npm run build

  docker:
    name: Docker Build
    runs-on: [self-hosted, nexus]
    needs: [test-engine]

    steps:
      - uses: actions/checkout@v4

      - name: Build engine image
        run: docker build -t nexus-engine:test .

      - name: Build frontend image
        run: docker build -t nexus-frontend:test ./frontend
