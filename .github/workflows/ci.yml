name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-engine:
    name: Engine Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: nexus_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          cd engine
          pip install -e .[dev]

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://nexus:test_password@localhost:5432/nexus_test
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
        run: |
          cd engine
          python -m pytest ../tests -v --tb=short --junitxml=../test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

  test-frontend:
    name: Frontend Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install & lint
        run: |
          cd frontend
          npm ci
          npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test-engine]

    steps:
      - uses: actions/checkout@v4

      - name: Build engine image
        run: docker build -t nexus-engine:test ./engine

      - name: Build frontend image
        run: docker build -t nexus-frontend:test ./frontend
