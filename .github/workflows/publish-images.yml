name: Publish container images

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (defaults to the ref)"
        required: false
        type: string

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish:
    name: Build & publish multi-arch image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' && !github.event.release.prerelease }}
            type=sha,format=long,prefix=sha-
          labels: |
            org.opencontainers.image.title=Nexus Trade Engine
            org.opencontainers.image.description=Algorithmic trading backtesting and execution engine
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build and push (multi-arch)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless, OIDC)
        env:
          COSIGN_EXPERIMENTAL: "true"
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          for tag in $TAGS; do
            cosign sign --yes "${tag}@${DIGEST}"
          done

      - name: Generate SBOM (Syft, SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          artifact-name: sbom-spdx.json
          upload-artifact: true
          upload-release-assets: ${{ github.event_name == 'release' }}

      - name: Attest SBOM
        if: github.event_name == 'release'
        uses: actions/attest-sbom@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: sbom-spdx.json
          push-to-registry: true

      - name: Summary
        run: |
          {
            echo "## Published image"
            echo ""
            echo "- **Registry:** \`${REGISTRY}/${IMAGE_NAME}\`"
            echo "- **Digest:** \`${DIGEST}\`"
            echo "- **Tags:**"
            for tag in ${TAGS}; do echo "  - \`${tag}\`"; done
            echo ""
            echo "Image is signed via cosign keyless OIDC and ships an SPDX SBOM attestation."
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
